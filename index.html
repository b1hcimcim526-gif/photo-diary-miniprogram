<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plog · 照片日记</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- 登录页 -->
    <section id="view-auth" class="view">
      <div class="onboarding">
        <h1 class="onboarding-title">用照片记录生活</h1>
        <input type="email" id="auth-email" class="auth-input" placeholder="邮箱" autocomplete="email" />
        <input type="password" id="auth-password" class="auth-input" placeholder="密码" autocomplete="current-password" />
        <button class="hand-btn" id="auth-login-btn">登录</button>
        <button class="hand-btn hand-btn-secondary" id="auth-signup-btn">注册新账号</button>
        <p class="auth-error" id="auth-error" hidden></p>
      </div>
    </section>

    <!-- 创作栏首页：朋友圈式按天列表 -->
    <section id="view-record" class="view">
      <header class="page-header">
        <span class="page-title">创作栏</span>
        <button type="button" class="icon-btn" id="btn-open-calendar-picker-home">📅</button>
      </header>
      <div id="record-feed" class="record-feed"></div>
    </section>

    <!-- 创作栏编辑页：单日大图卡片 -->
    <section id="view-record-editor" class="view">
      <header class="page-header">
        <button type="button" class="icon-btn" id="btn-back-to-feed">‹</button>
        <div class="header-titles">
          <span class="page-title">创作栏</span>
          <span class="record-date-label" id="record-date-label"></span>
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="btn-open-calendar-picker">📅</button>
        </div>
      </header>
      <form id="entry-form" class="entry-form">
        <div class="editor-preview-stage">
          <div class="editor-preview" id="editor-preview">
            <img id="editor-preview-img" alt="" hidden />
            <p class="editor-preview-empty" id="editor-preview-empty">还没有照片，点击下方 + 添加</p>
          </div>
          <span class="photo-count-badge" id="photo-count-badge"></span>
          <button type="button" class="photo-remove" id="btn-remove-current" hidden>×</button>
        </div>
        <div class="editor-thumb-row" id="editor-thumb-row"></div>
        <div class="editor-toolbar" id="editor-toolbar"></div>
        <input type="file" id="photo-input" accept="image/*" hidden />
        <button type="submit" class="hand-btn" id="btn-save-entry">保存</button>
      </form>
    </section>

    <!-- 日记本 - 书架首页（仅浏览和导出） -->
    <section id="view-diary-list" class="view">
      <header class="page-header">
        <span class="page-title">日记本</span>
        <button class="icon-btn" id="btn-logout">退出</button>
      </header>
      <div id="notebook-grid" class="notebook-grid"></div>
      <p id="gallery-empty" class="empty-state" hidden>还没有日记，去记录第一天吧～</p>
    </section>

    <!-- 日记本 - 单月详情 -->
    <section id="view-diary-month" class="view">
      <header class="page-header">
        <button type="button" class="icon-btn" id="btn-back-to-notebooks">‹</button>
        <span class="page-title" id="month-detail-title"></span>
        <button class="icon-btn" id="btn-export-month">导出</button>
      </header>
      <div class="month-detail-scroll" id="month-detail-scroll">
        <div class="month-detail-list" id="month-detail-list"></div>
      </div>
    </section>

    <!-- 记录 - 日历选日期 -->
    <section id="view-diary-calendar" class="view">
      <header class="page-header calendar-header">
        <button class="icon-btn" id="btn-prev-month">‹</button>
        <span class="page-title" id="calendar-month-label">2026年7月</span>
        <button class="icon-btn" id="btn-next-month">›</button>
        <button class="icon-btn" id="btn-back-to-record" title="返回记录">✕</button>
      </header>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- 底部 Tab -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item" data-view="record">
        <span class="nav-icon">📝</span>
        <span>创作栏</span>
      </button>
      <button class="nav-item" data-view="diary-list">
        <span class="nav-icon">📔</span>
        <span>日记本</span>
      </button>
    </nav>
  </div>

  <!-- 添加方式菜单 -->
  <div id="add-menu-modal" class="modal" hidden>
    <div class="modal-card">
      <p class="modal-title">添加照片</p>
      <button type="button" class="hand-btn" id="add-menu-single">添加单张</button>
      <button type="button" class="hand-btn" id="add-menu-multi">添加多张（一次最多9张）</button>
      <button type="button" class="hand-btn" id="add-menu-collage">添加拼图</button>
      <button type="button" class="icon-btn modal-close" id="add-menu-close">取消</button>
    </div>
  </div>

  <!-- 拼图模板选择 -->
  <div id="template-modal" class="modal" hidden>
    <div class="modal-card template-modal-card">
      <p class="modal-title">选择拼图模板</p>
      <div class="template-grid" id="template-grid"></div>
      <button type="button" class="icon-btn modal-close" id="template-close">取消</button>
    </div>
  </div>

  <!-- 拼图编辑器 -->
  <div id="collage-editor-modal" class="modal" hidden>
    <div class="modal-card collage-editor-card">
      <p class="modal-title">点击每一格添加照片</p>
      <div class="collage-editor-grid" id="collage-editor-grid"></div>
      <p class="text-editor-hint">拖动照片可调整位置</p>
      <button type="button" class="hand-btn" id="collage-done">完成</button>
      <button type="button" class="icon-btn modal-close" id="collage-close">取消</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
