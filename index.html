<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plog · 照片日记</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- 引导页 -->
    <section id="view-onboarding" class="view">
      <div class="onboarding">
        <h1 class="onboarding-title">用照片记录生活</h1>
        <button class="hand-btn" id="btn-start-record">开始记录</button>
        <button class="hand-btn hand-btn-secondary" id="btn-browse-diary">翻阅日记</button>
      </div>
    </section>

    <!-- 记录页 -->
    <section id="view-record" class="view">
      <header class="page-header">
        <span class="page-title">记录</span>
        <div class="header-actions">
          <input type="date" id="record-date" class="date-input" />
          <button type="button" class="icon-btn" id="btn-open-calendar-picker" title="选择过去的日子记录">📅</button>
        </div>
      </header>
      <form id="entry-form" class="entry-form">
        <div class="photo-carousel" id="photo-carousel"></div>
        <input type="file" id="photo-input" accept="image/*" hidden />
        <button type="submit" class="hand-btn">保存</button>
      </form>
    </section>

    <!-- 日记本 - 按月长图预览（仅浏览和导出） -->
    <section id="view-diary-list" class="view">
      <header class="page-header">
        <span class="page-title">日记本</span>
        <button class="icon-btn" id="btn-export-month">导出</button>
      </header>
      <div id="month-gallery" class="month-gallery"></div>
      <p id="gallery-empty" class="empty-state" hidden>还没有日记，去记录第一天吧～</p>
    </section>

    <!-- 记录 - 日历选日期 -->
    <section id="view-diary-calendar" class="view">
      <header class="page-header calendar-header">
        <button class="icon-btn" id="btn-prev-month">‹</button>
        <span class="page-title" id="calendar-month-label">2026年7月</span>
        <button class="icon-btn" id="btn-next-month">›</button>
        <button class="icon-btn" id="btn-back-to-record" title="返回记录">✕</button>
      </header>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- 底部 Tab -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item" data-view="record">
        <span class="nav-icon">📝</span>
        <span>记录</span>
      </button>
      <button class="nav-item" data-view="diary-list">
        <span class="nav-icon">📔</span>
        <span>日记本</span>
      </button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
